name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Jest
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: healthai
          POSTGRES_PASSWORD: healthai_secret
          POSTGRES_DB: healthai_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://healthai:healthai_secret@localhost:5432/healthai_db
      JWT_SECRET: test_jwt_secret_32_chars_minimum_xx
      JWT_EXPIRES_IN: 3600s
      JWT_ISSUER: healthai-api
      JWT_AUDIENCE: healthai-web
      API_KEY: test_api_key_32_chars_minimum_xxxxx
      FRONTEND_CLIENT_ID: healthai-web-client
      FRONTEND_ORIGIN: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  build-push:
    name: Build & Push → ghcr.io
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/healthai-corpo/healthai-api:latest
            ghcr.io/healthai-corpo/healthai-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
